*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#00040e;font-family:"Segoe UI",Arial,sans-serif;overflow-x:hidden;padding-top:58px}

.nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:10px 40px;background:rgba(0,4,14,0.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,200,255,0.12);height:58px}
.logo-link{display:inline-block;cursor:pointer}
.nav-logo{height:38px;display:block}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{color:#c0d0e0;text-decoration:none;font-size:13px;font-weight:500;letter-spacing:0.5px;transition:color 0.3s}
.nav-links a:hover{color:#00d4ff}
.nav-links a.active{color:#00d4ff;border-bottom:2px solid #00d4ff;padding-bottom:2px}
.nav-btn{background:transparent;border:1.5px solid #00d4ff;color:#00d4ff;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:rgba(0,212,255,0.15)}
.nav-btn svg{width:14px;height:14px}
.menu-toggle{display:none;background:transparent;border:1.5px solid #00d4ff;color:#00d4ff;cursor:pointer;padding:6px 14px;border-radius:6px;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:1px}
.menu-toggle svg{width:20px;height:20px;display:block}

.section{width:100%;max-width:1280px;margin:0 auto;position:relative;overflow-x:hidden}
.sec-inner{position:relative;width:100%}
.sec-inner picture,.sec-inner img{width:100%;display:block}
.section[id]{scroll-margin-top:58px}

.section+.section{margin-top:8px}
.section+.section::after{content:"";position:absolute;top:-5px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(0,212,255,0.35) 20%,rgba(0,212,255,0.6) 50%,rgba(0,212,255,0.35) 80%,transparent 100%);box-shadow:0 0 8px rgba(0,212,255,0.3);z-index:6}

/* Overlay buttons — transparent, positioned on top of images */
.ob{position:absolute;cursor:pointer;border-radius:8px;transition:background 0.3s,box-shadow 0.3s;z-index:10}
.ob:hover{background:rgba(255,255,255,0.08)}

/* Auto-pan indicator */
.pan-indicator{display:none;position:fixed;right:14px;bottom:14px;z-index:20;pointer-events:none;color:#00d4ff;background:rgba(0,4,14,0.85);border:1.5px solid #00d4ff;border-radius:16px;padding:6px 12px;font-size:11px;font-weight:600;letter-spacing:1px;opacity:0;transition:opacity 0.3s}
.pan-indicator.show{opacity:1}

@media (max-width: 900px){
  body{padding-top:56px}
  .nav{padding:10px 16px;height:56px}
  .nav-logo{height:32px}
  .menu-toggle{display:flex}
  .nav-links{position:fixed;top:56px;left:0;right:0;flex-direction:column;background:rgba(0,4,14,0.98);backdrop-filter:blur(14px);padding:20px;gap:16px;border-bottom:1px solid rgba(0,200,255,0.12);transform:translateY(-150%);transition:transform 0.3s;max-height:calc(100vh - 56px);overflow-y:auto}
  .nav-links.open{transform:translateY(0)}
  .nav-links a{font-size:16px;width:100%;padding:10px 0;border-bottom:1px solid rgba(0,200,255,0.08)}
  .nav-links a:last-child{border-bottom:none}
  .nav-btn{justify-content:center;padding:12px}
  .section[id]{scroll-margin-top:56px}
  .section+.section{margin-top:4px}
  .section+.section::after{top:-2px;left:15%;right:15%;opacity:0.5}

  /* HORIZONTAL ZOOM: image renders at 185% of viewport. Auto-pans on entry. */
  .section{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .section::-webkit-scrollbar{display:none}
  .sec-inner{width:185%;min-width:185%}
  /* Portrait image (sec-6) needs different treatment on mobile */
  #sec-6 .sec-inner{width:100%;min-width:100%}
  .pan-indicator{display:block}
}

<script>
// Force page to start at the top
if('scrollRestoration' in history){history.scrollRestoration='manual'}
window.addEventListener('load',()=>{window.scrollTo(0,0)});

(function(){
  const menuToggle=document.getElementById('menuToggle');
  const navLinks=document.getElementById('navLinks');
  menuToggle.addEventListener('click',()=>navLinks.classList.toggle('open'));
  navLinks.querySelectorAll('a').forEach(a=>{
    a.addEventListener('click',()=>navLinks.classList.remove('open'));
  });
  const secs=document.querySelectorAll('.section[id]');
  const nls=document.querySelectorAll('.nav-links a:not(.nav-btn)');
  const nm={};
  nls.forEach(a=>{const h=a.getAttribute('href');if(h&&h.startsWith('#'))nm[h.substring(1)]=a});
  window.addEventListener('scroll',()=>{
    let c='';
    secs.forEach(s=>{if(window.scrollY>=s.offsetTop-100)c=s.id});
    nls.forEach(a=>a.classList.remove('active'));
    if(nm[c])nm[c].classList.add('active');
  });

  // ===== AUTO-PAN (MOBILE ONLY) =====
  const isMobile=()=>window.matchMedia('(max-width: 900px)').matches;
  const panIndicator=document.getElementById('panIndicator');
  const panned=new WeakSet();
  let userInteracted=new WeakSet();
  let currentAnimation=null;

  function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}

  function animateScroll(el,from,to,duration){
    return new Promise(resolve=>{
      const start=performance.now();
      if(currentAnimation)cancelAnimationFrame(currentAnimation);
      function step(now){
        const elapsed=now-start;
        const t=Math.min(elapsed/duration,1);
        const eased=easeInOutCubic(t);
        el.scrollLeft=from+(to-from)*eased;
        if(t<1 && !userInteracted.has(el)){
          currentAnimation=requestAnimationFrame(step);
        }else{
          resolve();
        }
      }
      currentAnimation=requestAnimationFrame(step);
    });
  }

  async function autoPan(section){
    if(panned.has(section) || !isMobile())return;
    panned.add(section);
    const inner=section.querySelector('.sec-inner');
    if(!inner)return;
    const img=inner.querySelector('img');
    if(img && !img.complete){
      await new Promise(r=>{
        img.addEventListener('load',r,{once:true});
        img.addEventListener('error',r,{once:true});
        setTimeout(r,3000);
      });
    }
    await new Promise(r=>requestAnimationFrame(r));
    const maxScroll=section.scrollWidth-section.clientWidth;
    if(maxScroll<=5)return;
    const onTouch=()=>{userInteracted.add(section)};
    section.addEventListener('touchstart',onTouch,{passive:true,once:true});
    panIndicator.classList.add('show');
    await new Promise(r=>setTimeout(r,800));
    if(userInteracted.has(section)){panIndicator.classList.remove('show');return}
    await animateScroll(section,0,maxScroll,2800);
    if(userInteracted.has(section)){panIndicator.classList.remove('show');return}
    await new Promise(r=>setTimeout(r,1200));
    if(userInteracted.has(section)){panIndicator.classList.remove('show');return}
    await animateScroll(section,maxScroll,0,1400);
    panIndicator.classList.remove('show');
  }

  function initAutoPan(){
    if(!isMobile())return;
    if('IntersectionObserver' in window){
      const io=new IntersectionObserver((entries)=>{
        entries.forEach(e=>{
          if(e.isIntersecting && e.intersectionRatio>0.4){
            autoPan(e.target);
          }
        });
      },{threshold:[0.4]});
      document.querySelectorAll('.section').forEach(s=>io.observe(s));
    }else{
      const first=document.querySelector('.section');
      if(first)setTimeout(()=>autoPan(first),800);
    }
  }

  if(document.readyState==='complete'){
    setTimeout(initAutoPan,200);
  }else{
    window.addEventListener('load',()=>setTimeout(initAutoPan,200));
  }
})();
</script>
